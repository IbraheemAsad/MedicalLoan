repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]

  # NOTE: black is intentionally NOT enforced yet — the legacy codebase
  # isn't black-formatted. Dev tooling for black is still installed via
  # `pip install -e .[dev]` so individuals can run `black .` locally.
  # A dedicated "baseline format" PR will run black across all files,
  # after which this hook should be re-enabled.
  # - repo: https://github.com/psf/black
  #   rev: 24.10.0
  #   hooks:
  #     - id: black
