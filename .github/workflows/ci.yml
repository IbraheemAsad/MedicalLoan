name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (check only)
        run: ruff check .

      # NOTE: `black --check` is intentionally not enforced yet.
      # The legacy codebase isn't black-formatted; a dedicated "baseline
      # format" PR will run black once across all files. Until then devs
      # can still run `black .` locally — config lives in pyproject.toml.

  syntax:
    name: Compile-check sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Byte-compile project
        run: python -m compileall -q main.py database.py reports.py medicalloan/ services/

  test:
    name: Pytest (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        # The Tk-using tests are skipped on headless CI by the import
        # gate inside conftest; this still exercises DB / preferences
        # / backup / report renderer tests.
        run: pytest -q

  build:
    name: Build single-file executable
    runs-on: ubuntu-latest
    # Needs the lint/syntax jobs to be green before we burn build
    # minutes on a known-broken commit.
    needs: [syntax]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller==6.10.0

      - name: Build executable
        run: python scripts/build_exe.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: medicalloan-linux
          path: dist/medicalloan*
          if-no-files-found: error
          retention-days: 14
