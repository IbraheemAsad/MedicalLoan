name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (check only)
        run: ruff check .

      # NOTE: `black --check` is intentionally not enforced yet.
      # The legacy codebase isn't black-formatted; a dedicated "baseline
      # format" PR will run black once across all files. Until then devs
      # can still run `black .` locally — config lives in pyproject.toml.

  syntax:
    name: Compile-check sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Byte-compile project
        run: python -m compileall -q main.py database.py reports.py
